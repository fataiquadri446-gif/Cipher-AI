<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cipher</title>
<style>
  :root {
    --bg: #0a0e14;
    --panel: #11161f;
    --line: #1f2733;
    --accent: #5eead4;
    --accent-dim: #2dd4bf33;
    --text: #e6edf3;
    --text-dim: #8b96a5;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  header {
    padding: 18px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .glyph {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent), #0d9488);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: "Courier New", monospace;
    font-weight: 700;
    color: #06281f;
    font-size: 15px;
  }

  header h1 {
    font-size: 17px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  header span {
    font-size: 12px;
    color: var(--text-dim);
    font-family: "Courier New", monospace;
  }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .msg {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    line-height: 1.45;
    font-size: 15px;
    white-space: pre-wrap;
  }

  .user {
    align-self: flex-end;
    background: var(--accent-dim);
    border: 1px solid var(--accent);
    border-bottom-right-radius: 3px;
  }

  .bot {
    align-self: flex-start;
    background: var(--panel);
    border: 1px solid var(--line);
    border-bottom-left-radius: 3px;
  }

  .bot.typing {
    color: var(--text-dim);
    font-family: "Courier New", monospace;
    font-size: 13px;
  }

  form {
    display: flex;
    gap: 10px;
    padding: 16px;
    border-top: 1px solid var(--line);
    background: var(--bg);
  }

  input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--text);
    font-size: 15px;
    outline: none;
  }

  input:focus {
    border-color: var(--accent);
  }

  button {
    background: var(--accent);
    color: #06281f;
    border: none;
    border-radius: 10px;
    padding: 0 18px;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
  }

  button:active { transform: scale(0.97); }

  button:disabled {
    opacity: 0.5;
    cursor: default;
  }
</style>
</head>
<body>

<header>
  <div class="glyph">¢</div>
  <div>
    <h1>Cipher</h1>
  </div>
  <span style="margin-left:auto;">created by Fatai Quadri</span>
</header>

<div id="chat">
  <div class="msg bot">Hi, I'm Cipher. Ask me anything, or give me a calculation to solve.</div>
</div>

<form id="form">
  <input id="input" type="text" placeholder="Message Cipher…" autocomplete="off" />
  <button id="send" type="submit">Send</button>
</form>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');

  function addMessage(text, role) {
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const typingEl = addMessage('decrypting response…', 'bot typing');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await res.json();
      typingEl.textContent = data.reply || 'No response.';
      typingEl.classList.remove('typing');
    } catch (err) {
      typingEl.textContent = 'Connection error. Is the server running?';
      typingEl.classList.remove('typing');
    }

    sendBtn.disabled = false;
    input.focus();
  });
</script>

</body>
</html>
