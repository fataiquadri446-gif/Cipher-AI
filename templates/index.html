<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #262626;
      --text-primary: #ececec;
      --text-secondary: #b4b4b4;
      --accent: #2dd4bf;
      --accent-dark: #06b6a8;
      --border: #40414f;
      --user-bg: #40414f;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* ===== AUTH SCREEN ===== */
    #auth-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: var(--bg-primary);
    }

    .auth-box {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 32px;
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .auth-logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .auth-logo h1 { font-size: 22px; font-weight: 700; }
    .auth-logo span { font-size: 12px; color: var(--text-secondary); display: block; }

    .auth-tabs {
      display: flex;
      background: var(--bg-tertiary);
      border-radius: 10px;
      padding: 4px;
      gap: 4px;
    }

    .auth-tab {
      flex: 1;
      padding: 9px;
      border: none;
      border-radius: 8px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .auth-tab.active {
      background: var(--bg-secondary);
      color: var(--text-primary);
    }

    .auth-form { display: flex; flex-direction: column; gap: 12px; }

    .auth-form input {
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
      width: 100%;
    }

    .auth-form input:focus { border-color: var(--accent); }
    .auth-form input::placeholder { color: var(--text-secondary); }

    .auth-btn {
      background: var(--accent);
      color: #05282c;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .auth-btn:hover { background: var(--accent-dark); }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .auth-error {
      color: #ef4444;
      font-size: 13px;
      text-align: center;
      min-height: 18px;
    }

    /* ===== APP SCREEN ===== */
    #app-screen {
      display: none;
      flex-direction: column;
      height: 100vh;
    }

    /* App body wraps sidebar + main so sidebar can sit alongside chat */
    #app-body {
      flex: 1;
      display: flex;
      overflow: hidden;
      min-height: 0;
    }

    /* Header */
    header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 16px;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    .icon-btn:hover {
      color: var(--text-primary);
      border-color: var(--accent);
    }

    .logo-badge {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-weight: 700;
      color: #05282c;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-spacer { flex: 1; }

    .header-info {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: "Courier New", monospace;
    }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: 8px;
    }

    .logout-btn:hover {
      color: #ef4444;
      border-color: #ef4444;
      background: rgba(239,68,68,0.08);
      transform: none;
    }

    /* ===== HISTORY SIDEBAR ===== */
    #history-sidebar {
      width: 280px;
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: margin-left 0.25s ease;
      margin-left: -280px;
    }

    #history-sidebar.open {
      margin-left: 0;
    }

    .history-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .history-header h2 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .history-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .history-list::-webkit-scrollbar { width: 6px; }
    .history-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .history-date-label {
      font-size: 11px;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 10px 4px;
    }

    .history-item {
      background: transparent;
      border: 1px solid transparent;
      border-radius: 8px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.15s;
      text-align: left;
    }

    .history-item:hover {
      background: var(--bg-tertiary);
      border-color: var(--border);
    }

    .history-item .snippet {
      font-size: 13px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .history-item .time {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .history-empty {
      padding: 20px 12px;
      font-size: 13px;
      color: var(--text-secondary);
      text-align: center;
    }

    /* Backdrop for narrow screens when sidebar is open */
    #sidebar-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 5;
    }

    /* Main chat column */
    #main-col {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    /* Chat Container */
    #chat {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    #chat::-webkit-scrollbar-thumb:hover { background: var(--text-secondary); }

    /* Messages */
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 16px;
      word-wrap: break-word;
      white-space: pre-wrap;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #05282c;
      border-radius: 18px 18px 4px 18px;
      font-weight: 500;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
    }

    .msg.bot.thinking {
      color: var(--text-secondary);
      font-style: italic;
    }

    .msg.highlighted {
      outline: 2px solid var(--accent);
    }

    /* Input Area */
    .input-area {
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    form {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }

    input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      background: var(--bg-secondary);
    }

    input::placeholder { color: var(--text-secondary); }

    button {
      background: var(--accent);
      color: #05282c;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 600;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover { background: var(--accent-dark); transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Welcome State */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .welcome-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-weight: 700;
      color: #05282c;
      font-size: 36px;
    }

    .welcome h2 { font-size: 28px; color: var(--text-primary); font-weight: 600; }
    .welcome p { font-size: 14px; max-width: 300px; }

    /* Responsive */
    @media (max-width: 768px) {
      .msg { max-width: 95%; padding: 10px 14px; font-size: 15px; }
      header h1 { font-size: 16px; }
      .header-info { display: none; }
      .welcome h2 { font-size: 24px; }

      .auth-box { margin: 16px; padding: 28px 20px; }

      #history-sidebar {
        position: fixed;
        top: 60px;
        bottom: 0;
        left: 0;
        z-index: 10;
        width: 260px;
        margin-left: -260px;
      }

      #history-sidebar.open {
        margin-left: 0;
      }

      #history-sidebar.open ~ #sidebar-backdrop,
      #sidebar-backdrop.open {
        display: block;
      }
    }
  </style>
</head>
<body>

<!-- ===== AUTH SCREEN ===== -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">
      <div class="logo-badge">¢</div>
      <div>
        <h1>Cipher</h1>
        <span>created by Fatai Quadri</span>
      </div>
    </div>

    <div class="auth-tabs">
      <button class="auth-tab active" onclick="showTab('login')">Log in</button>
      <button class="auth-tab" onclick="showTab('signup')">Sign up</button>
    </div>

    <!-- Login -->
    <div id="login-form" class="auth-form">
      <input type="email" id="login-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="login-password" placeholder="Password" autocomplete="current-password" />
      <div class="auth-error" id="login-error"></div>
      <button class="auth-btn" onclick="doLogin()">Log in</button>
    </div>

    <!-- Signup -->
    <div id="signup-form" class="auth-form" style="display:none;">
      <input type="text" id="signup-username" placeholder="Username" autocomplete="username" />
      <input type="email" id="signup-email" placeholder="Email" autocomplete="email" />
      <input type="password" id="signup-password" placeholder="Password (min 6 chars)" autocomplete="new-password" />
      <div class="auth-error" id="signup-error"></div>
      <button class="auth-btn" onclick="doSignup()">Create account</button>
    </div>
  </div>
</div>

<!-- ===== APP SCREEN ===== -->
<div id="app-screen">

  <header>
    <button class="icon-btn" id="history-toggle" onclick="toggleSidebar()" title="Chat history">☰</button>
    <div class="logo-badge">¢</div>
    <h1>Cipher</h1>
    <div class="header-spacer"></div>
    <div class="header-info" id="header-greeting">created by Fatai Quadri</div>
    <button class="logout-btn" onclick="doLogout()">Sign out</button>
  </header>

  <div id="app-body">

    <!-- History Sidebar -->
    <div id="history-sidebar">
      <div class="history-header">
        <h2>History</h2>
        <button class="icon-btn" onclick="startNewChat()" title="New chat" style="width:28px;height:28px;font-size:14px;">+</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="history-empty">No conversations yet.</div>
      </div>
    </div>
    <div id="sidebar-backdrop" onclick="toggleSidebar()"></div>

    <!-- Main chat column -->
    <div id="main-col">
      <div id="chat">
        <div class="welcome" id="welcome-block">
          <div class="welcome-logo">¢</div>
          <h2 id="welcome-heading">Cipher</h2>
          <p>Ask me anything, or give me a calculation to solve.</p>
        </div>
      </div>

      <div class="input-area">
        <form id="form">
          <input id="input" type="text" placeholder="Message Cipher…" autocomplete="off" />
          <button id="send" type="submit">Send</button>
        </form>
      </div>
    </div>

  </div>

</div>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const historySidebar = document.getElementById('history-sidebar');
  const historyList = document.getElementById('history-list');
  const sidebarBackdrop = document.getElementById('sidebar-backdrop');
  let hasMessages = false;
  let currentUsername = null;

  // ===== AUTH =====
  function showTab(tab) {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i===0&&tab==='login')||(i===1&&tab==='signup'));
    });
    document.getElementById('login-form').style.display = tab==='login' ? 'flex' : 'none';
    document.getElementById('signup-form').style.display = tab==='signup' ? 'flex' : 'none';
  }

  async function doLogin() {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    const res = await fetch('/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (data.success) { enterApp(data.username); }
    else { errEl.textContent = data.error || 'Login failed.'; }
  }

  async function doSignup() {
    const username = document.getElementById('signup-username').value.trim();
    const email = document.getElementById('signup-email').value.trim();
    const password = document.getElementById('signup-password').value;
    const errEl = document.getElementById('signup-error');
    errEl.textContent = '';
    const res = await fetch('/signup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, email, password})
    });
    const data = await res.json();
    if (data.success) { enterApp(data.username); }
    else { errEl.textContent = data.error || 'Signup failed.'; }
  }

  async function doLogout() {
    await fetch('/logout', {method: 'POST'});
    location.reload();
  }

  function enterApp(username) {
    currentUsername = username;
    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('app-screen').style.display = 'flex';
    document.getElementById('app-screen').style.flexDirection = 'column';

    // Personalized welcome
    document.getElementById('header-greeting').textContent = `Welcome, ${username}`;
    document.getElementById('welcome-heading').textContent = `Welcome back, ${username}`;

    input.focus();
    loadHistory();
  }

  // Check if already logged in on page load
  (async () => {
    const res = await fetch('/me');
    const data = await res.json();
    if (data.logged_in) { enterApp(data.username); }
  })();

  // ===== HISTORY SIDEBAR =====
  function toggleSidebar() {
    historySidebar.classList.toggle('open');
    sidebarBackdrop.classList.toggle('open');
  }

  function startNewChat() {
    chat.innerHTML = '';
    hasMessages = false;
    clearWelcome();
    chat.innerHTML = '';
    hasMessages = false;
    const welcome = document.createElement('div');
    welcome.className = 'welcome';
    welcome.innerHTML = `<div class="welcome-logo">¢</div><h2>Welcome back, ${currentUsername || ''}</h2><p>Ask me anything, or give me a calculation to solve.</p>`;
    chat.appendChild(welcome);
    if (window.innerWidth <= 768) toggleSidebar();
  }

  // Expects GET /history to return JSON:
  // { history: [ { id, message, reply, timestamp } , ... ] }  (oldest -> newest, or any order; we sort client-side)
  async function loadHistory() {
    try {
      const res = await fetch('/history');
      if (!res.ok) return; // backend route may not exist yet
      const data = await res.json();
      const items = (data.history || []).slice().sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));
      renderHistorySidebar(items);
      if (items.length) {
        clearWelcome();
        items.forEach(item => {
          addMessage(item.message, 'user', false);
          addMessage(item.reply, 'bot', false);
        });
        chat.scrollTop = chat.scrollHeight;
      }
    } catch (err) {
      console.error('Could not load history:', err);
    }
  }

  function renderHistorySidebar(items) {
    historyList.innerHTML = '';
    if (!items.length) {
      historyList.innerHTML = '<div class="history-empty">No conversations yet.</div>';
      return;
    }
    let lastLabel = null;
    // newest first in the sidebar
    items.slice().reverse().forEach(item => {
      const dateObj = new Date(item.timestamp);
      const label = dateObj.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
      if (label !== lastLabel) {
        const labelEl = document.createElement('div');
        labelEl.className = 'history-date-label';
        labelEl.textContent = label;
        historyList.appendChild(labelEl);
        lastLabel = label;
      }
      const btn = document.createElement('button');
      btn.className = 'history-item';
      btn.innerHTML = `<div class="snippet">${escapeHtml(item.message)}</div><div class="time">${dateObj.to
