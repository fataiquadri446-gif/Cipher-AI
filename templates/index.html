<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cipher</title>
  <style>
    * { 
      box-sizing: border-box; 
      margin: 0;
      padding: 0;
    }

    :root {
      --bg-primary: #0d0d0d;
      --bg-secondary: #1a1a1a;
      --bg-tertiary: #262626;
      --text-primary: #ececec;
      --text-secondary: #b4b4b4;
      --accent: #2dd4bf;
      --accent-dark: #06b6a8;
      --border: #40414f;
      --user-bg: #40414f;
    }

    html, body {
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      height: 60px;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 12px;
      flex-shrink: 0;
    }

    .logo-badge {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-weight: 700;
      color: #05282c;
      font-size: 20px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
    }

    .header-spacer {
      flex: 1;
    }

    .header-info {
      font-size: 12px;
      color: var(--text-secondary);
      font-family: "Courier New", monospace;
    }

    /* Chat Container */
    #chat {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar {
      width: 8px;
    }

    #chat::-webkit-scrollbar-track {
      background: transparent;
    }

    #chat::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 4px;
    }

    #chat::-webkit-scrollbar-thumb:hover {
      background: var(--text-secondary);
    }

    /* Messages */
    .msg {
      max-width: 85%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.5;
      font-size: 16px;
      word-wrap: break-word;
      white-space: pre-wrap;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: #05282c;
      border-radius: 18px 18px 4px 18px;
      font-weight: 500;
    }

    .msg.bot {
      align-self: flex-start;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 18px 18px 18px 4px;
    }

    .msg.bot.thinking {
      color: var(--text-secondary);
      font-style: italic;
    }

    /* Input Area */
    .input-area {
      background: var(--bg-primary);
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      flex-shrink: 0;
    }

    form {
      display: flex;
      gap: 12px;
      max-width: 100%;
    }

    input {
      flex: 1;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--text-primary);
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s, background-color 0.2s;
    }

    input:focus {
      border-color: var(--accent);
      background: var(--bg-secondary);
    }

    input::placeholder {
      color: var(--text-secondary);
    }

    button {
      background: var(--accent);
      color: #05282c;
      border: none;
      border-radius: 12px;
      padding: 0 20px;
      font-weight: 600;
      font-size: 16px;
      font-family: inherit;
      cursor: pointer;
      transition: all 0.2s;
      min-width: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    button:hover {
      background: var(--accent-dark);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    /* Welcome State */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 20px;
      text-align: center;
      color: var(--text-secondary);
    }

    .welcome-logo {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-dark) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Courier New", monospace;
      font-weight: 700;
      color: #05282c;
      font-size: 36px;
    }

    .welcome h2 {
      font-size: 28px;
      color: var(--text-primary);
      font-weight: 600;
    }

    .welcome p {
      font-size: 14px;
      max-width: 300px;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .msg {
        max-width: 95%;
        padding: 10px 14px;
        font-size: 15px;
      }

      header h1 {
        font-size: 16px;
      }

      .header-info {
        display: none;
      }

      .welcome h2 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">¢</div>
  <h1>Cipher</h1>
  <div class="header-spacer"></div>
  <div class="header-info">created by Fatai Quadri</div>
</header>

<div id="chat">
  <div class="welcome">
    <div class="welcome-logo">¢</div>
    <h2>Cipher</h2>
    <p>Ask me anything, or give me a calculation to solve.</p>
  </div>
</div>

<div class="input-area">
  <form id="form">
    <input id="input" type="text" placeholder="Message Cipher…" autocomplete="off" />
    <button id="send" type="submit">Send</button>
  </form>
</div>

<script>
  const chat = document.getElementById('chat');
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  let hasMessages = false;

  function clearWelcome() {
    if (!hasMessages) {
      chat.innerHTML = '';
      hasMessages = true;
    }
  }

  function addMessage(text, role) {
    clearWelcome();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, 'user');
    input.value = '';
    sendBtn.disabled = true;

    const thinkingEl = addMessage('Thinking…', 'bot thinking');

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      if (!res.ok) {
        throw new Error(`Server error: ${res.status}`);
      }

      const data = await res.json();
      thinkingEl.textContent = data.reply || 'No response received.';
      thinkingEl.classList.remove('thinking');
    } catch (err) {
      thinkingEl.textContent = `Error: ${err.message}. Please try again.`;
      thinkingEl.classList.remove('thinking');
    }

    sendBtn.disabled = false;
    input.focus();
  });

  input.focus();
</script>

</body>
</html>
